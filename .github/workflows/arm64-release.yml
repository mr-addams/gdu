name: Linux Release

# Tracks upstream dundee/gdu and publishes amd64 + arm64 packages on every new release.
# Runs daily at 06:00 UTC or manually via workflow_dispatch.

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      force_tag:
        description: 'Force rebuild for a specific tag (e.g. v5.36.1). Leave empty for auto-detection.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  check:
    name: Check upstream
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      skip: ${{ steps.resolve.outputs.skip }}
    steps:
      - name: Resolve target tag
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FORCE="${{ github.event.inputs.force_tag }}"

          if [[ -n "$FORCE" ]]; then
            TAG="$FORCE"
            echo "Forced tag: $TAG"
          else
            TAG=$(curl -fsSL \
              -H "Authorization: Bearer $GH_TOKEN" \
              https://api.github.com/repos/dundee/gdu/releases/latest \
              | jq -r '.tag_name')
            echo "Latest upstream tag: $TAG"
          fi

          # No -f: 404 means release doesn't exist yet, which is fine
          STATUS=$(curl -sSL -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG")

          echo "Fork release status for $TAG: $STATUS"

          if [[ "$STATUS" == "200" && -z "$FORCE" ]]; then
            echo "Release $TAG already exists, skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.goarch }}
    needs: check
    if: needs.check.outputs.skip == 'false'
    runs-on: ubuntu-latest
    env:
      TAG: ${{ needs.check.outputs.tag }}
    strategy:
      matrix:
        goarch: [amd64, arm64]

    steps:
      - name: Checkout upstream tag
        uses: actions/checkout@v4
        with:
          repository: dundee/gdu
          ref: ${{ env.TAG }}
          fetch-depth: 0

      - name: Fetch packaging files from fork
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          path: _fork
          sparse-checkout: |
            nfpm.yaml
            .github/release-notes.md

      - name: Copy packaging files into working directory
        run: |
          cp _fork/nfpm.yaml .
          cp _fork/.github/release-notes.md .github/
          rm -rf _fork

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install nfpm
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Build binary
        run: |
          mkdir -p dist
          BUILD_TIME=$(LC_ALL=en_US.UTF-8 date)
          CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.goarch }} go build \
            -trimpath -mod=readonly -modcacherw \
            -ldflags="-s -w \
              -X 'github.com/dundee/gdu/v5/build.Version=$TAG' \
              -X 'github.com/dundee/gdu/v5/build.User=github.com/mr-addams' \
              -X 'github.com/dundee/gdu/v5/build.Time=$BUILD_TIME'" \
            -o dist/gdu_linux_${{ matrix.goarch }} \
            github.com/dundee/gdu/v5/cmd/gdu

      - name: Build man page
        run: |
          sudo apt-get install -y --no-install-recommends pandoc
          DATE=$(date +'%Y-%m-%d')
          sed "s/{{date}}/$DATE/g" gdu.1.md > gdu.1.date.md
          pandoc gdu.1.date.md -s -t man > gdu.1
          rm gdu.1.date.md

      - name: Package .deb / .rpm / .apk
        run: |
          NFPM="$(go env GOPATH)/bin/nfpm"
          GOARCH=${{ matrix.goarch }} VERSION=$TAG envsubst < nfpm.yaml | "$NFPM" package --config /dev/stdin --packager deb --target dist/
          GOARCH=${{ matrix.goarch }} VERSION=$TAG envsubst < nfpm.yaml | "$NFPM" package --config /dev/stdin --packager rpm --target dist/
          GOARCH=${{ matrix.goarch }} VERSION=$TAG envsubst < nfpm.yaml | "$NFPM" package --config /dev/stdin --packager apk --target dist/

      - name: Pack binary into .tgz
        run: |
          cd dist
          tar czf gdu_linux_${{ matrix.goarch }}.tgz gdu_linux_${{ matrix.goarch }}
          rm gdu_linux_${{ matrix.goarch }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.goarch }}
          path: dist/
          retention-days: 1

  release:
    name: Publish release
    needs: [check, build]
    runs-on: ubuntu-latest
    env:
      TAG: ${{ needs.check.outputs.tag }}

    steps:
      - name: Fetch release notes from fork
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          sparse-checkout: .github/release-notes.md

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: SHA256 checksums
        run: |
          cd dist
          sha256sum * > sha256sums.txt
          cat sha256sums.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete existing release if force_tag was used (re-build scenario)
          if [[ -n "${{ github.event.inputs.force_tag }}" ]]; then
            gh release delete "$TAG" --repo "${{ github.repository }}" --yes 2>/dev/null || true
            git push --delete origin "$TAG" 2>/dev/null || true
          fi
          envsubst < .github/release-notes.md > /tmp/release-notes.md
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "gdu $TAG (linux amd64 + arm64)" \
            --notes-file /tmp/release-notes.md \
            dist/*
